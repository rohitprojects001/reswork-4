<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — RESWORK</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="rgb-ambient"></div>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="assets/logo.png" alt="RESWORK" onerror="this.style.display='none'">
    RESWORK
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="store.html">Store</a>
    <a href="#" data-open-cart>Cart</a>
    <a href="../admin/index.html">Orders</a>
  </div>
  <div class="nav-actions">
    <button class="nav-icon-btn" data-open-cart aria-label="Cart">
      <svg viewBox="0 0 24 24"><path d="M3 6h2l2.4 12.4a2 2 0 0 0 2 1.6h8.4a2 2 0 0 0 2-1.6L22 8H6"/><circle cx="9" cy="21" r="1"/><circle cx="18" cy="21" r="1"/></svg>
      <span class="cart-badge">0</span>
    </button>
  </div>
</nav>

<div class="product-page" id="productPage"></div>

<section class="related">
  <div class="section-head reveal"><h2 class="section-title">You May Also Like</h2></div>
  <div class="product-grid reveal" id="relatedGrid"></div>
</section>

<footer>
  <div class="display">RESWORK</div>
  <p>Fashion forward styles, made to move.</p>
  <a class="admin-link" href="../admin/index.html">Admin Portal →</a>
</footer>

<div class="cart-overlay" data-close-cart></div>
<aside class="cart-drawer">
  <div class="cart-head"><h3>Your Bag</h3><button data-close-cart>✕</button></div>
  <div class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row"><span>Total</span><span class="cart-total-value">₹0</span></div>
    <button class="btn btn-primary" style="width:100%;" data-open-checkout>Checkout</button>
  </div>
</aside>

<div class="modal-overlay">
  <div class="modal-box">
    <div class="checkout-view">
      <h3>Delivery Details</h3>
      <form id="checkoutForm">
        <div class="field"><label>Full Name</label><input name="name" required placeholder="Your name"></div>
        <div class="field"><label>Phone Number</label><input name="phone" required placeholder="10-digit number" pattern="[0-9]{10}"></div>
        <div class="field"><label>Delivery Address</label><textarea name="address" rows="3" required placeholder="House no, street, city, pincode"></textarea></div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">Pay & Place Order</button>
      </form>
    </div>
    <div class="success-view" style="display:none;">
      <div class="success-box">
        <div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
        <h3>Order Placed!</h3>
        <p style="color:var(--grey);">Order ID: <strong class="order-id" style="color:var(--white);"></strong></p>
        <button class="btn btn-outline" style="margin-top:20px;" data-close-modal>Done</button>
      </div>
    </div>
  </div>
</div>

<div class="toast"></div>

<div id="setupBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:999;background:#ff3c78;color:#fff;text-align:center;padding:10px;font-size:.85rem;font-weight:600;">
  ⚠️ Firebase not connected yet — fill in <code>shared/firebase-config.js</code> with your project keys. See README.
</div>

<script type="module" src="../shared/firebase-data.js"></script>
<script type="module" src="../shared/razorpay-bridge.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/cart.js"></script>
<script>
  window.addEventListener("reswork-db-unconfigured", () => {
    document.getElementById("setupBanner").style.display = "block";
  });

  const params = new URLSearchParams(location.search);
  const productId = params.get("id");
  let product = null;
  let activeImg = 0, activeColor = "", activeSize = "", qty = 1;
  let loaded = false;

  window.addEventListener("reswork-products-updated", () => {
    if (loaded) {
      product = Store.getProduct(productId) || product;
      renderProduct();
      return;
    }
    product = Store.getProduct(productId) || Store.getProducts()[0];
    if (!product) {
      document.getElementById("productPage").innerHTML = `<div class="no-results" style="grid-column:1/-1;">No products yet. Add some from the Admin Portal.</div>`;
      return;
    }
    activeColor = product.colors[0];
    activeSize = product.sizes[0];
    loaded = true;
    renderProduct();
    renderRelated();
  });

  function renderProduct() {
    document.title = product.name + " — RESWORK";
    document.getElementById("productPage").innerHTML = `
      <div>
        <div class="gallery-main">
          ${product.images.map((src, i) => `<img src="${src}" class="${i===activeImg?'is-active':''}" data-img="${i}">`).join("")}
        </div>
        <div class="gallery-thumbs">
          ${product.images.map((src, i) => `<img src="${src}" class="${i===activeImg?'is-active':''}" data-thumb="${i}">`).join("")}
        </div>
      </div>
      <div>
        <div class="pd-tag">${product.tag} · ${product.category}</div>
        <h1 class="pd-title">${product.name}</h1>
        <div class="pd-price">₹${product.price.toLocaleString("en-IN")}</div>
        <p class="pd-desc">${product.description}</p>

        <div class="option-group">
          <span class="option-label">Color</span>
          <div class="swatches">
            ${product.colors.map(c => `<button class="swatch ${c===activeColor?'active':''}" data-color="${c}">${c}</button>`).join("")}
          </div>
        </div>
        <div class="option-group">
          <span class="option-label">Size</span>
          <div class="swatches">
            ${product.sizes.map(s => `<button class="swatch ${s===activeSize?'active':''}" data-size="${s}">${s}</button>`).join("")}
          </div>
        </div>

        <div class="qty-row">
          <div class="qty-control">
            <button id="qtyMinus">−</button><span id="qtyVal">${qty}</span><button id="qtyPlus">+</button>
          </div>
          <span class="stock-note">${product.stock > 0 ? product.stock + " in stock" : "Out of stock"}</span>
        </div>

        <div class="pd-actions">
          <button class="btn btn-outline" id="addToCartBtn">Add to Cart</button>
          <button class="btn btn-primary" id="buyNowBtn">Buy Now</button>
        </div>

        <div class="accordion">
          <div class="accordion-item">
            <button data-acc>Delivery &amp; Returns <span class="acc-icon">+</span></button>
            <div class="acc-body">Free delivery on orders above ₹999. Easy returns within 15 days of delivery, no questions asked.</div>
          </div>
          <div class="accordion-item">
            <button data-acc>Fabric &amp; Care <span class="acc-icon">+</span></button>
            <div class="acc-body">Machine wash cold, inside out. Do not bleach. Tumble dry low or hang to air dry.</div>
          </div>
        </div>
      </div>
    `;
    bindProductEvents();
  }

  function bindProductEvents() {
    document.querySelectorAll(".gallery-thumbs img").forEach(img =>
      img.addEventListener("click", () => { activeImg = +img.dataset.thumb; renderProduct(); })
    );
    document.querySelectorAll("[data-color]").forEach(b =>
      b.addEventListener("click", () => { activeColor = b.dataset.color; renderProduct(); })
    );
    document.querySelectorAll("[data-size]").forEach(b =>
      b.addEventListener("click", () => { activeSize = b.dataset.size; renderProduct(); })
    );
    document.getElementById("qtyPlus").addEventListener("click", () => { qty++; document.getElementById("qtyVal").textContent = qty; });
    document.getElementById("qtyMinus").addEventListener("click", () => { if (qty>1) qty--; document.getElementById("qtyVal").textContent = qty; });

    document.querySelectorAll("[data-acc]").forEach(b =>
      b.addEventListener("click", () => b.closest(".accordion-item").classList.toggle("open"))
    );

    document.getElementById("addToCartBtn").addEventListener("click", (e) => {
      Store.addToCart({ id: product.id, name: product.name, price: product.price, image: product.images[0], color: activeColor, size: activeSize, qty });
      showToast("Added to bag");
      e.target.classList.add("added");
      setTimeout(() => e.target.classList.remove("added"), 400);
    });
    document.getElementById("buyNowBtn").addEventListener("click", () => {
      Store.addToCart({ id: product.id, name: product.name, price: product.price, image: product.images[0], color: activeColor, size: activeSize, qty });
      document.querySelector("[data-open-checkout]").click();
    });
  }

  function renderRelated() {
    const related = Store.getProducts().filter(p => p.id !== product.id && p.category === product.category).slice(0,4);
    const fallback = Store.getProducts().filter(p => p.id !== product.id).slice(0,4);
    const relList = related.length ? related : fallback;
    document.getElementById("relatedGrid").innerHTML = relList.map(p => `
      <a class="product-card" href="product.html?id=${p.id}">
        <div class="product-media">
          <span class="product-tag">${p.tag}</span>
          <img src="${p.images[0]}" alt="${p.name}">
          <img src="${p.images[1]}" alt="${p.name} alt">
          <button class="product-quickadd" data-quickadd="${p.id}" aria-label="Quick add">
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </div>
        <div class="product-info">
          <div class="pname">${p.name}</div>
          <div class="pcat">${p.category}</div>
          <div class="pprice">₹${p.price.toLocaleString("en-IN")}</div>
        </div>
      </a>
    `).join("");
  }
</script>
</body>
</html>
